services:
  - type: web
    name: splitrace
    runtime: ruby
    plan: free
    buildCommand: |
      bundle install
      (cd frontend && npm ci && npm run build)
      bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: NODE_VERSION
        value: "22.22.3"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: splitrace-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: splitrace-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_WEB_CLIENT_ID
        sync: false
      - key: GOOGLE_IOS_CLIENT_ID
        sync: false
      - key: GOOGLE_ANDROID_CLIENT_ID
        sync: false
      - key: GOOGLE_EXPO_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_PRIVATE_KEY
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false

  - type: redis
    name: splitrace-redis
    plan: free
    ipAllowList: []

databases:
  - name: splitrace-db
    plan: free
    postgresMajorVersion: "16"
