name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RAILS_ENV: test
  DB_HOST: 127.0.0.1
  DB_USERNAME: postgres
  DB_PASSWORD: postgres

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: splitrace_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d splitrace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare database
        run: bin/rails db:test:prepare

      - name: RuboCop
        run: bundle exec rubocop
        env:
          RUBOCOP_CACHE_ROOT: tmp/rubocop_cache

      - name: Rails tests with coverage
        run: COVERAGE=1 bin/rails test

      - name: Backend coverage summary
        if: always()
        run: |
          ruby -rjson -e '
            path = "coverage/.last_run.json"
            exit 0 unless File.exist?(path)
            result = JSON.parse(File.read(path))["result"] || {}
            lines = result["covered_percent"] || result["line"]
            branches = result["branch"]
            summary = "### Backend coverage\n\n"
            summary += "- Lines: #{format("%.2f", lines)}%\n" if lines
            summary += "- Branches: #{format("%.2f", branches)}%\n" if branches
            File.open(ENV.fetch("GITHUB_STEP_SUMMARY"), "a") { |file| file.puts(summary) }
          '

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage
          if-no-files-found: ignore

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: splitrace_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d splitrace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Prettier
        working-directory: frontend
        run: npx prettier --check .

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke/e2e
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Prettier
        working-directory: mobile
        run: npx prettier --check .

      - name: ESLint
        working-directory: mobile
        run: npm run lint

      - name: Jest with coverage
        working-directory: mobile
        run: npm run test:coverage -- --runInBand

      - name: Mobile coverage summary
        if: always()
        working-directory: mobile
        run: |
          node -e '
            const fs = require("fs");
            const path = "coverage/coverage-summary.json";
            if (!fs.existsSync(path)) process.exit(0);
            const total = JSON.parse(fs.readFileSync(path, "utf8")).total;
            const summary = [
              "### Mobile coverage",
              "",
              "- Lines: " + total.lines.pct + "%",
              "- Statements: " + total.statements.pct + "%",
              "- Branches: " + total.branches.pct + "%",
              "- Functions: " + total.functions.pct + "%",
              ""
            ].join("\n");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          '

      - name: Upload mobile coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage
          if-no-files-found: ignore

      - name: Upload mobile coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: mobile/coverage/lcov.info
          flags: mobile
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
